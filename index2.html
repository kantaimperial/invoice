<title>領収書発行 | 超セラミックス 2026年4月若手合宿</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    background: #f5f4f0;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container { max-width: 640px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 2.5rem; }
  header h1 { font-size: 13px; font-weight: 400; color: #888; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
  header h2 { font-size: 22px; font-weight: 500; color: #1a1a1a; line-height: 1.4; }

  .tabs { display: none; }
  .tab {
    padding: 10px 20px; font-size: 14px; color: #888; cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s;
  }
  .tab:hover { color: #1a1a1a; }
  .tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; font-weight: 500; }

  .section { display: block; }
  .section.visible { display: block; }

  .card {
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 12px;
    padding: 2rem;
    margin-bottom: 1.5rem;
  }
  .card-title { font-size: 16px; font-weight: 500; margin-bottom: 0.25rem; }
  .card-sub { font-size: 13px; color: #888; margin-bottom: 2rem; }

  label.field-label {
    display: block; font-size: 12px; font-weight: 500;
    color: #555; letter-spacing: 0.04em; margin-bottom: 6px; text-transform: uppercase;
  }
  input[type=text], input[type=file] {
    width: 100%; padding: 10px 14px; font-size: 15px;
    border: 1px solid #ddd; border-radius: 8px; background: #fafafa;
    outline: none; margin-bottom: 1.5rem; transition: border-color 0.15s;
    font-family: inherit;
  }
  input[type=text]:focus, input[type=file]:focus { border-color: #1a1a1a; background: #fff; }

  .option-group { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .option-btn {
    flex: 1; min-width: 120px; padding: 12px 10px; border: 1px solid #ddd;
    border-radius: 8px; background: #fafafa; cursor: pointer; text-align: center;
    transition: all 0.15s; user-select: none;
  }
  .option-btn:hover { border-color: #aaa; }
  .option-btn.selected { border-color: #1a1a1a; background: #fff; box-shadow: inset 0 0 0 1px #1a1a1a; }
  .option-btn .opt-title { font-size: 14px; font-weight: 500; color: #1a1a1a; }
  .option-btn .opt-sub { font-size: 12px; color: #888; margin-top: 3px; }

  #nights-section { display: block; }

  .btn-generate {
    width: 100%; padding: 14px; background: #1a1a1a; color: #fff;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 500;
    cursor: pointer; letter-spacing: 0.02em; transition: background 0.15s;
    font-family: inherit;
  }
  .btn-generate:hover { background: #333; }

  .notice {
    background: #f5f4f0; border-radius: 8px; padding: 14px 16px;
    font-size: 13px; color: #666; margin-bottom: 1.5rem; line-height: 1.6;
  }

  @media (max-width: 480px) {
    .option-group { flex-direction: column; }
    .option-btn { min-width: unset; }
    .tabs { overflow-x: auto; }
    .tab { white-space: nowrap; }
  }
</style>

<div class="container">
  <header>
    <h1>科学研究費助成事業 学術変革領域研究（A）</h1>
    <h2>「超セラミックス」2026年4月若手合宿<br>領収書発行システム</h2>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="showTab('form')">領収書を発行</div>
    <div class="tab" onclick="showTab('qr')">QRコード</div>
  </div>

  <!-- 発行フォーム -->
  <div id="tab-form" class="section visible">
    <div class="card">
      <div class="card-title">領収書発行フォーム</div>
      <div class="card-sub">必要事項を入力してPDFをダウンロードしてください</div>

      <label class="field-label">お名前（宛名）</label>
      <input type="text" id="name" placeholder="例：山田 太郎">

      <label class="field-label">領収書 No.</label>
      <input type="text" id="receiptNo" placeholder="例：001">

      <label class="field-label">発行する領収書</label>
      <div class="option-group" id="type-group">
        <div class="option-btn selected" onclick="selectType('both', this)">
          <div class="opt-title">両方</div>
          <div class="opt-sub">宿泊費 + 参加費</div>
        </div>
        <div class="option-btn" onclick="selectType('stay', this)">
          <div class="opt-title">宿泊費のみ</div>
          <div class="opt-sub">¥11,000 or ¥22,000</div>
        </div>
        <div class="option-btn" onclick="selectType('reg', this)">
          <div class="opt-title">参加費のみ</div>
          <div class="opt-sub">¥3,500</div>
        </div>
      </div>

      <div id="nights-section">
        <label class="field-label">宿泊日数</label>
        <div class="option-group" id="nights-group">
          <div class="option-btn selected" onclick="selectNights(2, this)">
            <div class="opt-title">2泊（4/21〜23）</div>
            <div class="opt-sub">¥22,000（税込）</div>
          </div>
          <div class="option-btn" onclick="selectNights(1, this)">
            <div class="opt-title">1泊</div>
            <div class="opt-sub">¥11,000（税込）</div>
          </div>
        </div>
      </div>

      <button class="btn-generate" onclick="generatePDF()">PDFを生成してダウンロード</button>
    </div>
  </div>
</div>

const fontUrl = 'https://fonts.gstatic.com/s/notoserifjp/v33/xn71YHs72GKoTvER4Gn3b5eMRtWGkp6o7MjQ2bwxOubA.ttf';
let fontData = null;

function arrayBufferToBase64(buffer) {
  const bytes = new Uint8Array(buffer);
  const chunk = 0x8000;
  let binary = '';
  for (let i = 0; i < bytes.length; i += chunk) {
    binary += String.fromCharCode.apply(null, bytes.subarray(i, Math.min(i + chunk, bytes.length)));
  }
  return window.btoa(binary);
}

function applyJapaneseFont(doc) {
  return new Promise(async (resolve, reject) => {
    try {
      if (!fontData) {
        const resp = await fetch(fontUrl);
        if (!resp.ok) throw new Error(`Font fetch failed: ${resp.status}`);
        const buf = await resp.arrayBuffer();
        fontData = arrayBufferToBase64(buf);
      }
      const data = fontData;
      doc.addFileToVFS('NotoSerifJP-Regular.ttf', data);
      doc.addFont('NotoSerifJP-Regular.ttf', 'NotoSerifJP', 'normal');
      doc.setFont('NotoSerifJP', 'normal');
      resolve();
    } catch (err) {
      reject(err);
    }
  });
}

function selectType(type, el) {
  selectedType = type;
  document.querySelectorAll('#type-group .option-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('nights-section').style.display = (type === 'reg') ? 'none' : 'block';
}

function selectNights(n, el) {
  selectedNights = n;
  document.querySelectorAll('#nights-group .option-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
}

function drawHatchingBackground(doc, x, y, width, height, spacing = 3) {
  doc.setDrawColor(200, 200, 200);
  doc.setLineWidth(0.1);
  // 長方形パターン（小さな四角形）
  for (let i = 0; i < width; i += spacing) {
    for (let j = 0; j < height; j += spacing) {
      doc.rect(x + i, y + j, spacing * 0.8, spacing * 0.8, 'S');
    }
  }
}

function drawSeal(doc, x, y, diameter) {
  const radius = diameter / 2;
  doc.setDrawColor(170, 0, 0);
  doc.setLineWidth(1.5);
  doc.circle(x + radius, y + radius, radius, 'S');
  doc.setTextColor(0, 0, 0);
  doc.setFontSize(diameter * 0.9);
  doc.setFont('NotoSansJP', 'normal');
  doc.text('印', x + radius, y + radius + 1.5, { align: 'center', baseline: 'middle' });
  doc.setTextColor(0, 0, 0);
}

function drawSealImage(doc, x, y, width, height) {
  const imageType = sealImageDataUrl.startsWith('data:image/png') ? 'PNG' : 'JPEG';
  doc.addImage(sealImageDataUrl, imageType, x, y, width, height);
}

async function generatePDF() {
  const name = document.getElementById('name').value.trim();
  const no = document.getElementById('receiptNo').value.trim();
  if (!name) { alert('お名前を入力してください'); return; }

  const { jsPDF } = window.jspdf;

  const types = [];
  if (selectedType === 'both' || selectedType === 'stay') types.push('stay');
  if (selectedType === 'both' || selectedType === 'reg') types.push('reg');

  for (let i = 0; i < types.length; i++) {
    const type = types[i];
    const pw = 297 * 2;
    const ph = 210;
    const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: [pw, ph] });
    try {
      await applyJapaneseFont(doc);
    } catch (err) {
      alert('フォント読み込み中にエラーが発生しました。通信環境を確認してください。');
      console.error(err);
      return;
    }

    // 薄い水色の背景
    doc.setFillColor(230, 245, 250);
    doc.rect(0, 0, pw, ph, 'F');

    const ml = 40, mr = pw - 40, mt = 30;

    const amount = (type === 'stay') ? (selectedNights === 2 ? 22000 : 11000) : 3500;
    const amountFmt = '¥' + amount.toLocaleString();

    const tadashi = (type === 'stay')
      ? `学術変革領域研究「超セラミックス」2026年4月若手合宿（@御殿場）宿泊費（税込）として\n（宿泊日：2026年4月21日〜23日（${selectedNights}泊））`
      : `学術変革領域研究「超セラミックス」2026年4月若手合宿（@御殿場）参加登録費（2日間）（不課税）として`;

    // タイトル
    doc.setFontSize(46);
    doc.text('領　収　書', ml, mt, { align: 'left' });

    // 罫線
    doc.setDrawColor(180, 180, 180);
    doc.setLineWidth(0.3);
    doc.line(ml, mt + 12, mr, mt + 12);

    // 宛名・様、No
    doc.setFontSize(36);
    doc.text(name + ' 様', (ml + mr) / 2, mt + 28, { align: 'center' });
    doc.setFontSize(24);
    doc.text('No  ' + (no || '____'), mr - 30, mt + 28);

    // 金額背景に筑目パターン
    const amountBoxX = ml - 5;
    const amountBoxY = mt + 40;
    const amountBoxW = mr - ml + 10;
    const amountBoxH = 28;
    doc.setFillColor(245, 250, 255);
    doc.rect(amountBoxX, amountBoxY, amountBoxW, amountBoxH, 'F');
    drawHatchingBackground(doc, amountBoxX, amountBoxY, amountBoxW, amountBoxH, 2);

    // 金額
    doc.setFontSize(44);
    doc.text('★  ' + amountFmt, (ml + mr) / 2, mt + 54, { align: 'center' });

    // 但し書き
    doc.setFontSize(23);
    const tadLines = doc.splitTextToSize('但　' + tadashi, mr - ml - 4);
    doc.text(tadLines, ml, mt + 85);

    // 区切り線（削除）
    // const lineY = mt + 85 + tadLines.length * 25 + 10;
    // doc.line(ml, lineY, mr, lineY);

    // 発行日・正に領収
    doc.setFontSize(24);
    doc.text('令和8年04月21日', ml, mt + 110);
    const rightText = '上記正に領収いたしました。';
    const dateWidth = doc.getTextWidth('令和8年04月21日');
    doc.text(rightText, ml + dateWidth + 20, mt + 110);

    // doc.line(ml, mt + 120, mr, mt + 120);

    // 発行者
    doc.setFontSize(22);
    const issuerOrgLine1 = '科学研究費助成事業 学術変革領域研究（A）「超セラミックス」';
    doc.text(issuerOrgLine1, mr - doc.getTextWidth(issuerOrgLine1), mt + 125);
    
    // 領域代表者 前田和彦 印 を1行で配置
    doc.setFontSize(28);
    const issuerLine = '領域代表者 前田 和彦';
    const issuerLineWidth = doc.getTextWidth(issuerLine);
    doc.text(issuerLine, mr - issuerLineWidth - 30, mt + 145);
    
    const sealX = mr - 30 + 5;
    const sealY = mt + 129;
    const sealSize = 32;
    if (sealImageDataUrl) {
      drawSealImage(doc, sealX, sealY, sealSize, sealSize);
    } else {
      drawSeal(doc, sealX, sealY, sealSize);
    }

    const fname = (type === 'stay')
      ? `領収書_宿泊費_${name}.pdf`
      : `領収書_参加費_${name}.pdf`;
    doc.save(fname);

    if (i < types.length - 1) await new Promise(r => setTimeout(r, 400));
  }
}
</script>
</body>
</html>
